<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Mini Game</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:"Segoe UI",sans-serif;}
        body{background:linear-gradient(135deg,#74b9ff,#a29bfe,#fd79a8);min-height:100vh;padding:40px 20px;}
        .container{max-width:800px;margin:0 auto;}
        header{text-align:center;color:white;margin-bottom:30px;}
        .nav{display:flex;justify-content:center;gap:15px;margin-bottom:30px;}
        .nav a{padding:10px 20px;background:white;border-radius:10px;text-decoration:none;font-weight:bold;color:#333;}
        .nav a.active{background:#a29bfe;color:white;}
        .card{background:white;padding:30px;border-radius:20px;text-align:center;}
        .word{display:inline-block;padding:14px 20px;background:#e8f0fe;margin:8px;border-radius:12px;cursor:grab;}
        .drop{margin-top:25px;padding:25px;background:#f8f9fa;border:2px dashed #b2bec3;border-radius:14px;min-height:80px;}
        .btn{padding:12px 24px;background:#fd79a8;color:white;border:none;border-radius:12px;margin-top:20px;cursor:pointer;}
        .result{font-size:18px;font-weight:bold;margin-top:20px;color:#00b894;}
    </style>
</head>
<body>
    <div class="container">
        <header><h1>Sentence Building Game</h1></header>
        <div class="nav">
            <a href="index.html">Flashcards</a>
            <a href="quiz.html">Quiz</a>
            <a href="game.html" class="active">Game</a>
        </div>
        <div class="card">
            <p>Make: "Hello, I am a student."</p>
            <div>
                <div class="word" draggable="true">안녕하세요</div>
                <div class="word" draggable="true">저는</div>
                <div class="word" draggable="true">학생입니다</div>
            </div>
            <div class="drop" id="box">Drop here</div>
            <button class="btn" onclick="check()">Check Answer</button>
            <div class="result" id="res"></div>
        </div>
    </div>
    <script>
        const words=document.querySelectorAll(".word");
        const box=document.getElementById("box");
        words.forEach(w=>w.addEventListener("dragstart",e=>e.dataTransfer.setData("t",w.innerText)));
        box.addEventListener("dragover",e=>e.preventDefault());
        box.addEventListener("drop",e=>{
            e.preventDefault();
            const span=document.createElement("span");
            span.innerText=e.dataTransfer.getData("t")+" ";
            span.style.padding="8px";
            box.appendChild(span);
        });
        function check(){
            document.getElementById("res").innerText="✅ Correct! 안녕하세요 저는 학생입니다";
        }
    </script>
</body>
</html>
