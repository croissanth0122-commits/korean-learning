<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Quiz</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:"Segoe UI",sans-serif;}
        body{background:linear-gradient(135deg,#74b9ff,#a29bfe,#fd79a8);min-height:100vh;padding:40px 20px;}
        .container{max-width:800px;margin:0 auto;}
        header{text-align:center;color:white;margin-bottom:30px;}
        .nav{display:flex;justify-content:center;gap:15px;margin-bottom:30px;}
        .nav a{padding:10px 20px;background:white;border-radius:10px;text-decoration:none;font-weight:bold;color:#333;}
        .nav a.active{background:#fd79a8;color:white;}
        .card{background:white;padding:30px;border-radius:20px;}
        .question{font-size:18px;font-weight:bold;margin:15px 0 10px;}
        .option{background:#f1f2f6;padding:12px 20px;margin:8px 0;border-radius:10px;cursor:pointer;}
        .correct{background:#00b894;color:white;}
        .wrong{background:#ff6b6b;color:white;}
        .score{font-size:22px;font-weight:bold;color:#00b894;margin-top:20px;}
    </style>
</head>
<body>
    <div class="container">
        <header><h1>Korean Quiz</h1></header>
        <div class="nav">
            <a href="index.html">Flashcards</a>
            <a href="quiz.html" class="active">Quiz</a>
            <a href="game.html">Game</a>
        </div>
        <div class="card">
            <div id="quiz"></div>
            <div class="score" id="score"></div>
        </div>
    </div>
    <script>
        const quiz=[
            {q:"안녕하세요 means?",a:"Hello",o:["Hello","Thank you","Sorry"]},
            {q:"고맙습니다 means?",a:"Thank you",o:["Yes","Thank you","No"]},
            {q:"학생 means?",a:"Student",o:["Teacher","Student","Hello"]},
            {q:"사랑해요 means?",a:"I love you",o:["Good night","I love you","Sorry"]}
        ];
        let score=0;
        function load(){
            const q=document.getElementById("quiz");
            quiz.forEach((item,i)=>{
                const div=document.createElement("div");
                div.innerHTML=`<div class="question">Q${i+1}: ${item.q}</div>`;
                item.o.forEach(opt=>{
                    const o=document.createElement("div");
                    o.className="option";
                    o.innerText=opt;
                    o.onclick=()=>{
                        if(o.innerText===item.a){o.classList.add("correct");score++;}
                        else o.classList.add("wrong");
                        o.style.pointerEvents="none";
                        document.getElementById("score").innerText=`Score: ${score}/${quiz.length}`;
                    };
                    div.appendChild(o);
                });
                q.appendChild(div);
            });
        }
        load();
    </script>
</body>
</html>
