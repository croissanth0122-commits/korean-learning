<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Wrong Questions</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:"Segoe UI",sans-serif;}
        body{background:linear-gradient(135deg,#74b9ff,#a29bfe,#fd79a8);min-height:100vh;padding:40px 20px;}
        .container{max-width:800px;margin:0 auto;}
        header{text-align:center;color:white;margin-bottom:30px;}
        .nav{display:flex;justify-content:center;gap:15px;margin-bottom:30px;flex-wrap:wrap;}
        .nav a{padding:10px 20px;background:white;border-radius:10px;text-decoration:none;font-weight:bold;color:#333;transition:0.2s;}
        .nav a.active{background:#fd79a8;color:white;}
        .nav a:hover{opacity:0.9;}
        
        .card{background:white;padding:30px;border-radius:20px;margin-bottom:20px;}
        .item{padding:18px;border-left:4px solid #fd79a8;background:#fdfbfb;margin:12px 0;border-radius:8px;}
        .question{font-weight:bold;font-size:18px;margin-bottom:10px;color:#2d3436;}
        .answer{color:#00b894;font-weight:bold;margin-top:8px;font-size:16px;}
        .empty{text-align:center;color:#666;padding:30px;font-size:16px;}
        .clear-btn{
            background:#fd79a8;color:white;border:none;padding:12px 20px;
            border-radius:10px;cursor:pointer;margin-top:10px;font-weight:bold;
            transition:0.2s;
        }
        .clear-btn:hover{opacity:0.9;}
    </style>
</head>
<body>
    <div class="container">
        <header><h1>Wrong Questions Collection</h1></header>
        <div class="nav">
            <a href="index.html">Flashcards</a>
            <a href="practice.html">Practice</a>
            <a href="quiz.html">Quiz</a>
            <a href="wrong-list.html" class="active">Wrong Questions</a>
            <a href="dashboard.html">Dashboard</a>
        </div>

        <div class="card">
            <button class="clear-btn" onclick="clearWrong()">Clear All Wrong Questions</button>
            <div id="list" style="margin-top:20px;"></div>
        </div>
    </div>

    <script>
        // 加载错题列表
        function loadWrongList() {
            const list = JSON.parse(localStorage.getItem("wrongList")) || [];
            const el = document.getElementById("list");
            
            if (list.length === 0) {
                el.innerHTML = "<div class='empty'>No wrong questions yet 🎉</div>";
                return;
            }

            let html = "";
            list.forEach((q, index) => {
                html += `
                <div class="item">
                    <div class="question">${index + 1}. ${q.q}</div>
                    <div class="answer">✅ Correct Answer: ${q.a}</div>
                </div>`;
            });
            el.innerHTML = html;
        }

        // 清空所有错题
        function clearWrong() {
            if (confirm("Are you sure you want to clear all wrong questions?")) {
                localStorage.removeItem("wrongList");
                loadWrongList();
                alert("Cleared successfully!");
            }
        }

        // 页面加载时执行
        loadWrongList();
    </script>
</html>
