<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:"Segoe UI",sans-serif;}
        body{background:linear-gradient(135deg,#74b9ff,#a29bfe,#fd79a8);min-height:100vh;padding:40px 20px;}
        .container{max-width:800px;margin:0 auto;}
        header{text-align:center;color:white;margin-bottom:30px;}
        .nav{display:flex;justify-content:center;gap:15px;margin-bottom:30px;flex-wrap:wrap;}
        .nav a{padding:10px 20px;background:white;border-radius:10px;text-decoration:none;font-weight:bold;color:#333;transition:0.2s;}
        .nav a.active{background:#fd79a8;color:white;}
        .nav a:hover{opacity:0.9;}
        
        .grid{
            display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
            gap:20px;margin-bottom:30px;
        }
        .box{
            background:white;padding:30px;border-radius:20px;text-align:center;
        }
        .box h2{font-size:32px;color:#74b9ff;margin-bottom:5px;}
        .box p{color:#666;font-weight:bold;}
        .card{background:white;padding:30px;border-radius:20px;text-align:center;}
        .percent{font-size:40px;font-weight:bold;color:#00b894;margin:10px 0;}
    </style>
</head>
<body>
    <div class="container">
        <header><h1>Study Dashboard</h1></header>
        <div class="nav">
            <a href="index.html">Flashcards</a>
            <a href="practice.html">Practice</a>
            <a href="quiz.html">Quiz</a>
            <a href="wrong-list.html">Wrong Questions</a>
            <a href="dashboard.html" class="active">Dashboard</a>
        </div>

        <div class="grid">
            <div class="box">
                <h2 id="total">0</h2>
                <p>Total Questions</p>
            </div>
            <div class="box">
                <h2 id="wrong">0</h2>
                <p>Wrong Questions</p>
            </div>
            <div class="box">
                <h2 id="correct">0</h2>
                <p>Correct Answers</p>
            </div>
        </div>

        <div class="card">
            <p>Accuracy Rate</p>
            <div class="percent" id="rate">0%</div>
            <p>Keep learning! 📚</p>
        </div>
    </div>

    <script>
        function loadData() {
            const total = 10;
            const wrongList = JSON.parse(localStorage.getItem("wrongList")) || [];
            const wrong = wrongList.length;
            const correct = total - wrong;
            const rate = total > 0 ? Math.round((correct / total) * 100) : 0;

            document.getElementById("total").innerText = total;
            document.getElementById("wrong").innerText = wrong;
            document.getElementById("correct").innerText = correct;
            document.getElementById("rate").innerText = rate + "%";
        }

        loadData();
    </script>
</body>
</html>
